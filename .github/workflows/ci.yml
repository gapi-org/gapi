name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Format
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

      - name: Race Test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Build Examples
        run: go test ./examples/...

      - name: Install CLI
        run: go install ./cmd/gapi
